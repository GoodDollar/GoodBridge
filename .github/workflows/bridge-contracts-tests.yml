name: Bridge Contracts Unit Tests

on:
  push:
    branches:
      - feat/oft-adapter-step2
      - feat/oft-adapter-step1
      - master
    paths:
      - 'packages/bridge-contracts/**'
      - '.github/workflows/bridge-contracts-tests.yml'
  pull_request:
    branches:
      - feat/oft-adapter-step2
      - feat/oft-adapter-step1
      - master
    paths:
      - 'packages/bridge-contracts/**'
      - '.github/workflows/bridge-contracts-tests.yml'

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: yarn install --immutable
        env:
          YARN_NODE_LINKER: node-modules

      - name: Compile contracts
        run: yarn build
        working-directory: packages/bridge-contracts

      - name: Run unit tests
        run: yarn test test/GoodDollarOFT.test.ts
        working-directory: packages/bridge-contracts


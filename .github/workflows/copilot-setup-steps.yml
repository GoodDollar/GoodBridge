name: "Copilot Setup Steps"

# Automatically run the setup steps when they are changed to allow for easy validation,
# and allow manual testing through the repository's "Actions" tab.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Use the bundled Yarn from the repository (.yarn/releases/yarn-4.6.0.cjs)
      # so the correct version is always used without relying on corepack downloads.
      - name: Install root dependencies
        run: node .yarn/releases/yarn-4.6.0.cjs install

      # bridge-contracts uses nodeLinker: node-modules (its own .yarnrc.yml) while the root
      # uses PnP, so the workspace needs its own node_modules populated explicitly.
      - name: Install bridge-contracts node_modules
        run: node .yarn/releases/yarn-4.6.0.cjs workspace @gooddollar/bridge-contracts install

      # Compile contracts so the Solidity compiler binaries (0.8.22 and 0.8.10) are
      # downloaded and cached in ~/.cache/hardhat-nodejs before Copilot starts working.
      # Without this step, hardhat cannot compile or test because compiler downloads
      # are blocked by the agent's network firewall.
      - name: Pre-download Solidity compilers
        working-directory: packages/bridge-contracts
        run: node_modules/.bin/hardhat compile
